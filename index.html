<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Defensive fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to polyfill fetch in an environment where it's already defined but read-only.
      (function() {
        if (typeof window !== 'undefined' && 'fetch' in window) {
          const originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(val) { 
                console.warn('Attempted to override read-only window.fetch. Request ignored.');
              }
            });
          } catch (e) {
            // If already locked down, we've done our best.
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
